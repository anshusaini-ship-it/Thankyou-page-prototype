
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.proto-wrap { display: flex; height: 720px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-tertiary); }
.left-panel { width: 280px; min-width: 280px; background: var(--color-background-primary); border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; overflow: hidden; }
.left-header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.left-header .car-info { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.left-header .car-badge { width: 32px; height: 32px; border-radius: 8px; background: #EEF2FF; display: flex; align-items: center; justify-content: center; }
.left-header .car-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.left-header .car-sub { font-size: 11px; color: var(--color-text-secondary); }
.left-header .section-label { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 12px; margin-bottom: 6px; }
.states-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
.group-label { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 16px 4px; }
.state-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
.state-item:hover { background: var(--color-background-secondary); }
.state-item.active { background: #EEF2FF; border-left-color: #4F46E5; }
.state-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.state-dot.main { background: #4F46E5; }
.state-dot.edge { background: #F59E0B; }
.state-dot.recovery { background: #10B981; }
.state-dot.terminal { background: #EF4444; }
.state-name { font-size: 12px; color: var(--color-text-secondary); line-height: 1.3; }
.state-item.active .state-name { color: #3730A3; font-weight: 500; }
.state-num { font-size: 10px; color: var(--color-text-tertiary); margin-left: auto; flex-shrink: 0; }

.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 12px 20px; background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; }
.right-header .state-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.right-header .state-type-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.badge-main { background: #EEF2FF; color: #3730A3; }
.badge-edge { background: #FFFBEB; color: #92400E; }
.badge-recovery { background: #ECFDF5; color: #065F46; }
.badge-terminal { background: #FEF2F2; color: #991B1B; }

.screen-area { flex: 1; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; background: var(--color-background-tertiary); }
.phone-frame { width: 320px; background: #fff; border-radius: 36px; border: 8px solid #1a1a2e; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); flex-shrink: 0; }
.phone-notch-bar { background: #4F46E5; padding: 8px 16px 0; display: flex; align-items: center; justify-content: space-between; }
.phone-time { font-size: 11px; font-weight: 600; color: #fff; }
.phone-icons { display: flex; gap: 4px; align-items: center; }
.phone-icons span { font-size: 10px; color: #fff; }

.screen-content { background: #f5f5f5; min-height: 580px; }
.app-header { background: #4F46E5; padding: 10px 14px 12px; }
.app-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.back-btn { color: #fff; font-size: 18px; cursor: pointer; }
.car-title { color: #fff; font-size: 13px; font-weight: 600; }
.car-details { color: rgba(255,255,255,0.75); font-size: 10px; }
.car-img { width: 44px; height: 28px; background: rgba(255,255,255,0.15); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.current-status-bar { background: #4F46E5; padding: 0 14px 10px; display: flex; justify-content: space-between; align-items: center; }
.cs-label { color: rgba(255,255,255,0.8); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.cs-link { color: rgba(255,255,255,0.9); font-size: 10px; }

.status-card { background: #fff; margin: 10px; border-radius: 14px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.status-timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item { display: flex; align-items: flex-start; gap: 10px; position: relative; }
.tl-item:not(:last-child)::after { content: ''; position: absolute; left: 9px; top: 20px; width: 1.5px; height: calc(100% - 4px); background: #e5e7eb; }
.tl-item:not(:last-child).done::after { background: #4F46E5; }
.tl-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; font-weight: 700; z-index: 1; }
.tl-dot.done { background: #4F46E5; }
.tl-dot.active-blue { background: #4F46E5; }
.tl-dot.active-orange { background: #F59E0B; }
.tl-dot.active-red { background: #EF4444; }
.tl-dot.active-green { background: #10B981; }
.tl-dot.pending { background: #e5e7eb; }
.tl-content { padding-bottom: 14px; flex: 1; }
.tl-label-done { font-size: 11px; color: #9ca3af; }
.tl-label-active { font-size: 13px; font-weight: 600; color: #111827; }
.tl-label-active.orange { color: #D97706; }
.tl-label-active.red { color: #DC2626; }
.tl-label-active.green { color: #059669; }
.tl-sub { font-size: 11px; color: #6b7280; margin-top: 1px; }
.tl-link { font-size: 11px; color: #4F46E5; margin-top: 2px; display: block; }
.tl-link.red { color: #DC2626; }

.upsell-banner { background: #fff; margin: 0 10px 10px; border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #e5e7eb; }
.upsell-icon { width: 28px; height: 28px; background: #FFFBEB; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.upsell-text { flex: 1; }
.upsell-title { font-size: 11px; font-weight: 600; color: #111827; }
.upsell-sub { font-size: 10px; color: #6b7280; }
.upsell-arrow { font-size: 16px; color: #9ca3af; }

.section { margin: 0 10px 10px; background: #fff; border-radius: 12px; padding: 12px; }
.section-title { font-size: 12px; font-weight: 600; color: #111827; margin-bottom: 10px; }

.expert-card { display: flex; align-items: center; gap: 10px; }
.expert-avatar { width: 36px; height: 36px; border-radius: 50%; background: #EEF2FF; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #4F46E5; flex-shrink: 0; }
.expert-name { font-size: 12px; font-weight: 600; color: #111827; }
.expert-badge { font-size: 10px; color: #059669; display: flex; align-items: center; gap: 3px; }
.expert-stat { font-size: 10px; color: #6b7280; }
.call-btn { width: 100%; margin-top: 10px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.call-btn.grey { background: #e5e7eb; color: #9ca3af; }

.detail-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
.detail-icon { width: 22px; height: 22px; background: #EEF2FF; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
.detail-label { font-size: 10px; color: #6b7280; }
.detail-value { font-size: 11px; color: #111827; font-weight: 500; }
.detail-links { display: flex; gap: 8px; margin-top: 2px; }
.detail-link { font-size: 10px; color: #4F46E5; }
.detail-link.red { color: #DC2626; }

.doc-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid #f3f4f6; }
.doc-info .doc-name { font-size: 11px; font-weight: 500; color: #111827; }
.doc-info .doc-sub { font-size: 10px; color: #6b7280; }
.doc-status { font-size: 10px; color: #F59E0B; font-weight: 500; }
.doc-status.done { color: #10B981; }
.upload-btn { width: 52px; height: 36px; border: 1.5px dashed #d1d5db; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #9ca3af; flex-direction: column; gap: 1px; }

.view-all-btn { width: 100%; margin-top: 8px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }

.sell-section { margin: 0 10px 10px; background: #fff; border-radius: 12px; overflow: hidden; }
.sell-title { font-size: 12px; font-weight: 600; color: #111827; padding: 10px 12px 6px; }
.plan-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; }
.plan-row.green { background: #065F46; }
.plan-row.purple { background: #3730A3; }
.plan-row.light { background: #f9fafb; border-top: 0.5px solid #f3f4f6; }
.plan-name { font-size: 11px; font-weight: 600; color: #fff; }
.plan-name.dark { color: #111827; }
.plan-sub { font-size: 9px; color: rgba(255,255,255,0.75); }
.plan-sub.dark { color: #6b7280; }
.plan-badge { width: 28px; height: 28px; background: rgba(255,255,255,0.15); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.plan-price { font-size: 11px; font-weight: 600; color: #111827; }
.plan-old { font-size: 9px; color: #9ca3af; text-decoration: line-through; }

.desc-note { font-size: 11px; color: var(--color-text-secondary); padding: 0 10px 10px; line-height: 1.5; }

.stars { display: flex; gap: 4px; margin: 8px 0; }
.star { font-size: 20px; color: #F59E0B; }
.tip-row { display: flex; gap: 6px; margin-top: 8px; }
.tip-btn { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 6px; text-align: center; font-size: 11px; font-weight: 500; color: #374151; cursor: pointer; }
.tip-btn:hover { border-color: #4F46E5; color: #4F46E5; }

.nav-bottom { background: #fff; border-top: 0.5px solid #e5e7eb; display: flex; padding: 8px 0 4px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
.nav-icon { font-size: 18px; }
.nav-label { font-size: 9px; color: #9ca3af; }
.nav-label.active { color: #4F46E5; }

.legend { display: flex; gap: 12px; padding: 10px 16px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
</style>

<div class="proto-wrap">
  <div class="left-panel">
    <div class="left-header">
      <div class="car-info">
        <div class="car-badge">
          <svg width="20" height="14" viewBox="0 0 20 14" fill="none"><path d="M3 9H17M3 9L4.5 4.5H15.5L17 9M3 9V12H5V11H15V12H17V9" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round"/><circle cx="6" cy="11" r="1.5" fill="#4F46E5"/><circle cx="14" cy="11" r="1.5" fill="#4F46E5"/></svg>
        </div>
        <div>
          <div class="car-name">Kia Sonet</div>
          <div class="car-sub">DL 8C BB 4290 · ₹4.50L – ₹5.62L</div>
        </div>
      </div>
      <div class="section-label">All states</div>
    </div>
    <div class="states-scroll" id="statesList"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4F46E5"></div>Main flow</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>Edge case</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>Recovery</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div>Terminal</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="right-header">
      <div class="state-title" id="activeTitle">Inspection Booked</div>
      <span class="state-type-badge badge-main" id="activeBadge">Main flow</span>
    </div>
    <div class="screen-area">
      <div class="phone-frame">
        <div class="phone-notch-bar">
          <span class="phone-time">9:41</span>
          <div class="phone-icons">
            <span>●●●</span>
            <span>WiFi</span>
            <span>■</span>
          </div>
        </div>
        <div class="screen-content" id="screenContent"></div>
      </div>
    </div>
  </div>
</div>

<script>
const states = [
  { id: 1, name: 'Inspection booked', type: 'main', group: 'Main flow' },
  { id: 2, name: 'Car expert assigned', type: 'main', group: 'Main flow' },
  { id: 3, name: 'Car expert upgraded', type: 'main', group: 'Main flow' },
  { id: 4, name: 'Car expert on the way', type: 'main', group: 'Main flow' },
  { id: 5, name: 'Car expert reached', type: 'main', group: 'Main flow' },
  { id: 6, name: 'Inspection in progress', type: 'main', group: 'Main flow' },
  { id: 7, name: 'Inspection completed', type: 'main', group: 'Main flow' },
  { id: 8, name: 'Expert will start soon', type: 'edge', group: 'Edge cases' },
  { id: 9, name: 'Car expert running late', type: 'edge', group: 'Edge cases' },
  { id: 10, name: 'Looking for another expert', type: 'edge', group: 'Edge cases' },
  { id: 11, name: 'Sorry, no expert available', type: 'terminal', group: 'Edge cases' },
  { id: 12, name: 'Not able to contact you', type: 'terminal', group: 'Edge cases' },
  { id: 13, name: 'Inspection missed', type: 'terminal', group: 'Edge cases' },
  { id: 14, name: 'Senior expert assigned', type: 'recovery', group: 'Recovery' },
  { id: 15, name: 'Inspection cancelled', type: 'terminal', group: 'Cancellation' },
  { id: 16, name: 'Inspection cancelled (refund)', type: 'terminal', group: 'Cancellation' },
  { id: 17, name: 'Refund completed', type: 'recovery', group: 'Cancellation' },
];

const dotClass = { main: 'main', edge: 'edge', recovery: 'recovery', terminal: 'terminal' };
const badgeClass = { main: 'badge-main', edge: 'badge-edge', recovery: 'badge-recovery', terminal: 'badge-terminal' };
const badgeLabel = { main: 'Main flow', edge: 'Edge case', recovery: 'Recovery', terminal: 'Terminal' };

function renderList() {
  const list = document.getElementById('statesList');
  let lastGroup = '';
  let html = '';
  states.forEach((s, i) => {
    if (s.group !== lastGroup) {
      html += `<div class="group-label">${s.group}</div>`;
      lastGroup = s.group;
    }
    html += `<div class="state-item ${i===0?'active':''}" data-id="${s.id}" onclick="selectState(${s.id})">
      <div class="state-dot ${dotClass[s.type]}"></div>
      <div class="state-name">${s.name}</div>
      <div class="state-num">${s.id}</div>
    </div>`;
  });
  list.innerHTML = html;
}

function selectState(id) {
  document.querySelectorAll('.state-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });
  const s = states.find(x => x.id === id);
  document.getElementById('activeTitle').textContent = s.name.charAt(0).toUpperCase() + s.name.slice(1);
  document.getElementById('activeBadge').textContent = badgeLabel[s.type];
  document.getElementById('activeBadge').className = 'state-type-badge ' + badgeClass[s.type];
  document.getElementById('screenContent').innerHTML = renderScreen(id);
}

function baseBottom() {
  return `<div class="nav-bottom">
    <div class="nav-item"><div class="nav-icon" style="font-size:16px;color:#4F46E5;">⊙</div><div class="nav-label active">Home</div></div>
    <div class="nav-item"><div class="nav-icon" style="font-size:16px;color:#9ca3af;">☰</div><div class="nav-label">Orders</div></div>
    <div class="nav-item"><div class="nav-icon" style="font-size:16px;color:#9ca3af;">♡</div><div class="nav-label">Saved</div></div>
    <div class="nav-item"><div class="nav-icon" style="font-size:16px;color:#9ca3af;">👤</div><div class="nav-label">Profile</div></div>
  </div>`;
}

function appHeader() {
  return `<div class="app-header">
    <div class="app-header-top">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="back-btn">←</span>
        <div><div class="car-title">Kia Sonet</div><div class="car-details">DL 8C BB 4290 · ₹4.50L – ₹5.62L</div></div>
      </div>
      <div class="car-img"><svg width="28" height="16" viewBox="0 0 28 16" fill="none"><path d="M4 11H24M4 11L6.5 5H21.5L24 11M4 11V14H7V13H21V14H24V11" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="8.5" cy="13" r="1.5" fill="white"/><circle cx="19.5" cy="13" r="1.5" fill="white"/></svg></div>
    </div>
  </div>
  <div class="current-status-bar"><span class="cs-label">Current status</span><span class="cs-link">View details ▾</span></div>`;
}

function upsellBanner(text, sub) {
  return `<div class="upsell-banner"><div class="upsell-icon">★</div><div class="upsell-text"><div class="upsell-title">${text}</div><div class="upsell-sub">${sub}</div></div><span class="upsell-arrow">›</span></div>`;
}

function expertSection(name, callActive) {
  const initials = name.split(' ').map(n=>n[0]).join('');
  return `<div class="section"><div class="section-title">Meet your expert</div>
    <div class="expert-card">
      <div class="expert-avatar">${initials}</div>
      <div><div class="expert-name">${name}</div><div class="expert-badge">✓ Certified expert</div><div class="expert-stat">1,000+ inspections done so far</div></div>
    </div>
    ${callActive ? `<button class="call-btn">Call expert</button>` : `<div style="font-size:10px;color:#9ca3af;margin-top:8px;text-align:center;">Call will be available 1 hour before slot</div><button class="call-btn grey">Call expert</button>`}
  </div>`;
}

function inspectionDetails(reschedule=true) {
  return `<div class="section"><div class="section-title">Inspection details</div>
    <div class="detail-row"><div class="detail-icon">📅</div><div><div class="detail-label">Date & Time</div><div class="detail-value">Wed, May 22 · 4PM – 5PM</div>${reschedule?`<div class="detail-links"><span class="detail-link">Reschedule ▶</span><span class="detail-link red">Cancel ▶</span></div>`:''}</div></div>
    <div class="detail-row"><div class="detail-icon">📍</div><div><div class="detail-label">Inspection location</div><div class="detail-value">M3M Urbana, Sushant lok phase 1, Sector 43, Gurugram, 122002</div></div></div>
  </div>`;
}

function uploadDocs() {
  return `<div class="section"><div class="section-title">Upload documents</div>
    <div class="doc-row"><div class="doc-info"><div class="doc-name">RC Copy</div><div class="doc-sub">Official document issued by the government</div></div><div><div class="doc-status">Pending</div><div class="upload-btn">↑<span style="font-size:8px">Upload</span></div></div></div>
    <div class="doc-row" style="border:none"><div class="doc-info"><div class="doc-name">Insurance</div><div class="doc-sub">Official document issued by the government</div></div><div><div class="doc-status">Pending</div><div class="upload-btn">↑<span style="font-size:8px">Upload</span></div></div></div>
    <button class="view-all-btn">View all</button>
  </div>`;
}

function sellSection() {
  return `<div class="sell-section"><div class="sell-title">Sell your car faster</div>
    <div class="plan-row green"><div><div class="plan-name">Assured sell</div><div class="plan-sub">Sell your car in 30 days or pay nothing</div></div><div class="plan-badge">₹</div></div>
    <div class="plan-row purple"><div><div class="plan-name">Max reach</div><div class="plan-sub">Reach more dealers and sell faster</div></div><div class="plan-badge">20K+</div></div>
    <div class="plan-row light"><div style="display:flex;align-items:center;justify-content:space-between;width:100%"><div><div class="plan-name dark">Basic reach</div><div class="plan-sub dark">Get inspection report & expert help</div></div><div style="text-align:right"><div class="plan-price">₹499</div><div class="plan-old">₹999</div></div></div></div>
  </div>`;
}

function renderScreen(id) {
  switch(id) {
    case 1: return appHeader() + `<div class="status-card"><div class="status-timeline">
      <div class="tl-item done"><div class="tl-dot done">✓</div><div class="tl-content"><div class="tl-label-active">Inspection booked</div><div class="tl-sub">An expert will be assigned soon</div><a class="tl-link">Know how it works ▶</a></div></div>
      <div class="tl-item"><div class="tl-dot pending"></div><div class="tl-content"><div class="tl-label-done">Car expert assigned</div><div class="tl-sub">Arriving by 4:15 PM</div></div></div>
      <div class="tl-item"><div class="tl-dot pending"></div><div class="tl-content" style="padding-bottom:0"><div class="tl-label-done">Car expert on the way</div><div class="tl-sub">Yet to start</div></div></div>
    </div></div>` + upsellBanner('Upgrade to sell your car faster','Unlock price boost of up to 5%') + inspectionDetails() + uploadDocs() + sellSection() + baseBottom();

    case 2: return appHeader() + `<div class="status-card"><div class="status-timeline">
      <div class="tl-item done"><div class="tl-dot done">✓</div><div class="tl-content"><div class="tl-label-done">Inspection booked</div><div class="tl-sub">Booked at 3:19 PM</div></div></div>
