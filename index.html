<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype — Home Inspection · Thank You Page</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e5e5e5;min-height:100vh;padding:20px;}
.outer-wrap{display:flex;flex-direction:column;border:1px solid #e2e2e2;border-radius:12px;overflow:hidden;max-width:1400px;margin:0 auto;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:#fff;border-bottom:1px solid #e2e2e2;flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:8px;}
.tb-logo{width:24px;height:24px;background:#4F46E5;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-title{font-size:13px;font-weight:600;color:#111;}
.tb-sub{font-size:11px;color:#999;margin-left:2px;}
.tb-div{width:1px;height:20px;background:#e2e2e2;margin:0 12px;}
.tb-right{display:flex;align-items:center;gap:6px;}
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid #e2e2e2;background:#fff;color:#333;white-space:nowrap;cursor:pointer;transition:all .15s;}
.tbtn:hover{background:#f7f7f8;border-color:#ccc;color:#111;}
.tbtn.ora{background:#FFF7ED;border-color:#FED7AA;color:#C2410C;}
.tbtn.ora:hover{background:#FFEDD5;border-color:#FDBA74;}
.tbtn.ind{background:#EEF2FF;border-color:#C7D2FE;color:#4338CA;}
.tbtn.ind:hover{background:#E0E7FF;border-color:#A5B4FC;}

/* MAIN LAYOUT */
.proto-wrap{display:flex;height:720px;background:#efefef;user-select:none;}

/* LEFT */
.left-panel{width:210px;min-width:180px;background:#fff;border-right:1px solid #e2e2e2;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.lhdr{padding:14px 16px 10px;border-bottom:1px solid #e2e2e2;}
.cn{font-size:13px;font-weight:500;color:#111;}
.csub{font-size:10px;color:#555;margin-top:2px;}
.slbl{font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:4px;}
.sscroll{flex:1;overflow-y:auto;padding:6px 0;}
.sscroll::-webkit-scrollbar{width:3px;} .sscroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.glbl{font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;padding:10px 16px 3px;}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background .12s;border-left:2px solid transparent;}
.sitem:hover{background:#f7f7f8;}
.sitem.active{background:#EEF2FF;border-left-color:#4F46E5;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sdot.main{background:#4F46E5;} .sdot.edge{background:#F59E0B;} .sdot.recovery{background:#10B981;} .sdot.terminal{background:#EF4444;}
.snlbl{font-size:11px;color:#555;line-height:1.3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sitem.active .snlbl{color:#3730A3;font-weight:500;}
.snum{font-size:9px;color:#999;flex-shrink:0;}
.legend{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;border-top:1px solid #e2e2e2;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#555;}
.ld{width:6px;height:6px;border-radius:50%;}

/* CENTER */
.center-panel{width:290px;min-width:250px;display:flex;flex-direction:column;overflow:hidden;background:#efefef;flex-shrink:0;}
.chdr{padding:10px 14px;background:#fff;border-bottom:1px solid #e2e2e2;border-left:1px solid #e2e2e2;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ctitle{font-size:12px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;margin-right:8px;}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;flex-shrink:0;}
.bm{background:#EEF2FF;color:#3730A3;} .be{background:#FFFBEB;color:#92400E;} .br{background:#ECFDF5;color:#065F46;} .bt{background:#FEF2F2;color:#991B1B;}
.phone-area{flex:1;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;padding:14px;}
.pframe{width:256px;background:#fff;border-radius:30px;border:6px solid #1a1a2e;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.18);flex-shrink:0;position:relative;}
.pnbar{background:#4F46E5;padding:6px 12px 0;display:flex;align-items:center;justify-content:space-between;font-size:0;line-height:0;}
.ptime{font-size:10px;font-weight:600;color:#fff;line-height:1;}
.picons{font-size:9px;color:#fff;line-height:1;}
.scontent{background:#f5f5f5;min-height:500px;}

/* DRAG HANDLE */
.drag-handle{width:6px;min-width:6px;background:#efefef;cursor:col-resize;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;z-index:10;}
.drag-handle:hover,.drag-handle.dragging{background:#4F46E5;}
.drag-handle::after{content:'';width:2px;height:36px;background:#ccc;border-radius:2px;}
.drag-handle:hover::after,.drag-handle.dragging::after{background:#fff;}

/* RIGHT */
.right-panel{flex:1;min-width:220px;display:flex;flex-direction:column;overflow:hidden;background:#fff;border-left:1px solid #e2e2e2;}
.rhdr{padding:10px 16px;border-bottom:1px solid #e2e2e2;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.rtitle{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;}
.rhint{font-size:10px;color:#bbb;}
.rscroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;}
.rscroll::-webkit-scrollbar{width:3px;} .rscroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}

/* RIGHT CONTENT */
.occ-block{margin-bottom:14px;}
.occ-lbl{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.occ-val{font-size:12px;color:#111;line-height:1.65;background:#f7f7f8;border-radius:8px;padding:11px 13px;border-left:3px solid #4F46E5;word-break:break-word;}
.occ-val.orange{border-left-color:#F59E0B;} .occ-val.red{border-left-color:#EF4444;} .occ-val.green{border-left-color:#10B981;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
.tbox{background:#f7f7f8;border-radius:8px;padding:10px 12px;min-width:0;border:1px solid #e2e2e2;}
.tlbl{font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.tval{font-size:11px;color:#555;line-height:1.45;word-break:break-word;}
.tval.none{color:#aaa;font-style:italic;}
.divider{height:1px;background:#e2e2e2;margin:12px 0;}
.clbl{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.crow{border:1px solid #e2e2e2;border-radius:8px;margin-bottom:8px;overflow:hidden;}
.crh{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f7f7f8;border-bottom:1px solid #e2e2e2;}
.cri{font-size:14px;flex-shrink:0;}
.crn{font-size:12px;font-weight:500;color:#111;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cv{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0;white-space:nowrap;}
.va{background:#D1FAE5;color:#065F46;} .vh{background:#FEE2E2;color:#991B1B;}
.crb{padding:10px 12px;background:#fff;}
.cli{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;font-size:11px;color:#444;line-height:1.55;word-break:break-word;}
.cli:last-child{margin-bottom:0;}
.clb{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.clb.bl{background:#4F46E5;} .clb.or{background:#F59E0B;} .clb.rd{background:#EF4444;} .clb.gn{background:#10B981;} .clb.gy{background:#bbb;}

/* ============ PHONE UI ============ */
/* Blue header block: ahdr + csbar are children of one #4F46E5 wrapper — zero gap possible */
.bluehdr{background:#4F46E5;display:block;line-height:0;}
.ahdr{background:#4F46E5;padding:8px 10px 0;line-height:normal;}
.ahdrt{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.pct{color:#fff;font-size:11px;font-weight:600;}
.pcd{color:rgba(255,255,255,.75);font-size:9px;}
.pci{width:32px;height:20px;background:rgba(255,255,255,.15);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.csbar{background:#4F46E5;padding:4px 10px 8px;display:flex;justify-content:space-between;align-items:center;line-height:normal;}
.cslbl{color:rgba(255,255,255,.8);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.csbtn{color:#fff;font-size:9px;background:none;border:none;padding:0;text-decoration:underline;cursor:pointer;font-weight:500;}
.sc2{background:#fff;margin:7px;border-radius:10px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.ti{display:flex;align-items:flex-start;gap:7px;position:relative;}
.ti:not(:last-child)::after{content:'';position:absolute;left:7px;top:15px;width:1.5px;height:calc(100% - 2px);background:#e5e7eb;}
.ti:not(:last-child).dn::after{background:#4F46E5;} .ti:not(:last-child).wn::after{background:#F59E0B;}
.tdot{width:15px;height:15px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700;z-index:1;}
.tdot.dn,.tdot.ab{background:#4F46E5;} .tdot.ao{background:#F59E0B;} .tdot.ar{background:#EF4444;} .tdot.ag{background:#10B981;} .tdot.pd{background:#e5e7eb;}
.tc2{padding-bottom:10px;flex:1;}
.tld{font-size:9px;color:#9ca3af;} .tla{font-size:10px;font-weight:600;color:#111827;}
.tla.o{color:#D97706;} .tla.r{color:#DC2626;} .tla.g{color:#059669;}
.ts{font-size:8px;color:#6b7280;margin-top:1px;} .tlk{font-size:8px;color:#4F46E5;margin-top:1px;display:block;}
.ec2{background:#fff;margin:7px;border-radius:10px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.er{display:flex;align-items:flex-start;gap:7px;position:relative;}
.er:not(:last-child)::after{content:'';position:absolute;left:7px;top:18px;width:1.5px;height:calc(100% - 2px);background:#e5e7eb;}
.er:not(:last-child).edn::after{background:#4F46E5;} .er:not(:last-child).ewn::after{background:#F59E0B;}
.eia{width:15px;height:15px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;z-index:1;}
.eia.bl{background:#4F46E5;} .eia.or{background:#F59E0B;} .eia.rd{background:#EF4444;} .eia.gr{background:#10B981;}
.eid{width:15px;height:15px;border-radius:50%;background:#4F46E5;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700;z-index:1;}
.eip{width:15px;height:15px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;z-index:1;}
.eip::after{content:'';width:7px;height:7px;border-radius:50%;background:#d1d5db;display:block;}
.erc{padding-bottom:10px;flex:1;}
.ela{font-size:10px;font-weight:700;color:#111827;} .ela.o{color:#D97706;} .ela.r{color:#DC2626;} .ela.g{color:#059669;}
.eld,.elp{font-size:9px;color:#9ca3af;}
.es{font-size:8px;color:#9ca3af;margin-top:1px;} .es.cu{color:#6b7280;}
.elk{font-size:8px;color:#4F46E5;margin-top:2px;display:block;font-weight:500;}
.phu{background:#fff;margin:0 7px 7px;border-radius:8px;padding:7px 9px;display:flex;align-items:center;gap:7px;border:1px solid #e5e7eb;}
.phui{width:20px;height:20px;background:#FFFBEB;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.phut{font-size:9px;font-weight:600;color:#111827;} .phus{font-size:8px;color:#6b7280;}
.phs{margin:0 7px 7px;background:#fff;border-radius:8px;padding:9px;}
.phst{font-size:9px;font-weight:600;color:#111827;margin-bottom:7px;}
.phec{display:flex;align-items:center;gap:7px;}
.phea{width:26px;height:26px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#4F46E5;flex-shrink:0;}
.phen{font-size:9px;font-weight:600;color:#111827;} .pheb{font-size:8px;color:#059669;} .phes2{font-size:8px;color:#6b7280;}
.phcb{width:100%;margin-top:7px;background:#4F46E5;color:#fff;border:none;border-radius:5px;padding:5px;font-size:9px;font-weight:600;cursor:pointer;}
.phcb.gy{background:#e5e7eb;color:#9ca3af;}
.phdr{display:flex;gap:5px;margin-bottom:5px;align-items:flex-start;}
.phdi{width:16px;height:16px;background:#EEF2FF;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.phdlb{font-size:8px;color:#6b7280;} .phdv{font-size:9px;color:#111827;font-weight:500;}
.phdlnk{display:flex;gap:5px;margin-top:1px;}
.phdl2{font-size:8px;color:#4F46E5;} .phdl2.r{color:#DC2626;}
.phocr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:.5px solid #f3f4f6;}
.phon{font-size:9px;font-weight:500;color:#111827;} .phos{font-size:8px;color:#6b7280;}
.phop{font-size:8px;color:#F59E0B;font-weight:500;}
.phub{width:36px;height:24px;border:1.5px dashed #d1d5db;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#9ca3af;}
.phva{width:100%;margin-top:5px;background:#4F46E5;color:#fff;border:none;border-radius:5px;padding:5px;font-size:9px;font-weight:600;cursor:pointer;}
.phsl{margin:0 7px 7px;background:#fff;border-radius:8px;overflow:hidden;}
.phslt{font-size:9px;font-weight:600;color:#111827;padding:7px 9px 4px;}
.phpl{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;}
.phpl.g{background:#065F46;} .phpl.p{background:#3730A3;} .phpl.l{background:#f9fafb;border-top:.5px solid #f3f4f6;}
.phpn{font-size:9px;font-weight:600;color:#fff;} .phpn.dk{color:#111827;}
.phps{font-size:8px;color:rgba(255,255,255,.75);} .phps.dk{color:#6b7280;}
.phpb{width:20px;height:20px;background:rgba(255,255,255,.15);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;}
.phstr{display:flex;gap:2px;margin:5px 0;} .phstar{font-size:14px;color:#F59E0B;}
.phtr{display:flex;gap:3px;margin-top:5px;}
.phtb{flex:1;border:1px solid #e5e7eb;border-radius:5px;padding:3px;text-align:center;font-size:8px;color:#374151;}
.phnav{background:#fff;border-top:.5px solid #e5e7eb;display:flex;padding:5px 0 2px;}
.phni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;}
.phnl{font-size:7px;color:#9ca3af;} .phnl.a{color:#4F46E5;}

/* Cancel bottom sheet */
.bs-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;border-radius:24px;overflow:hidden;}
.bs-sheet{background:#fff;width:100%;border-radius:18px 18px 0 0;padding:14px 16px 20px;position:relative;animation:bsup .22s ease-out;}
@keyframes bsup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bs-close{position:absolute;top:10px;right:12px;width:22px;height:22px;border-radius:50%;background:#f3f4f6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555;line-height:1;}
.bs-icon{text-align:center;font-size:44px;margin:8px 0 10px;}
.bs-title{text-align:center;font-size:13px;font-weight:700;color:#111827;margin-bottom:6px;}
.bs-body{text-align:center;font-size:10px;color:#6b7280;line-height:1.55;margin-bottom:16px;}
.bs-btns{display:flex;gap:8px;}
.bs-cancel{flex:1;padding:9px;border-radius:10px;border:1.5px solid #4F46E5;background:#fff;color:#4F46E5;font-size:11px;font-weight:600;cursor:pointer;}
.bs-confirm{flex:1;padding:9px;border-radius:10px;border:none;background:#4F46E5;color:#fff;font-size:11px;font-weight:600;cursor:pointer;}

/* Reason selection sheet */
.bs-reasons{padding:14px 16px 16px;max-height:92%;overflow-y:auto;}
.bs-rtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.bs-rtitle{font-size:13px;font-weight:700;color:#111827;flex:1;}
.bs-close2{position:static;background:none;font-size:13px;color:#555;width:24px;height:24px;}
.bs-rlist{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.bs-rl{display:flex;align-items:center;gap:10px;padding:10px 10px;border:1.5px solid #e5e7eb;border-radius:10px;cursor:pointer;transition:all .12s;}
.bs-rl-sel{border-color:#4F46E5;background:#EEF2FF;}
.bs-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.bs-radio-sel{border-color:#4F46E5;background:#4F46E5;}
.bs-radio-sel::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff;display:block;}
.bs-rlbl{font-size:10px;color:#374151;line-height:1.4;}
.bs-rl-sel .bs-rlbl{color:#111827;font-weight:500;}
.bs-submit{width:100%;padding:10px;border-radius:10px;border:none;background:#e5e7eb;color:#9ca3af;font-size:11px;font-weight:600;cursor:not-allowed;transition:all .15s;}
.bs-submit-active{background:#4F46E5;color:#fff;cursor:pointer;}

/* Confirmation dialog (centred) */
.bs-dialog{background:#fff;width:100%;border-radius:18px;padding:16px;position:relative;text-align:center;animation:bsup .2s ease-out;}
.bs-close3{position:absolute;top:10px;right:10px;background:#f3f4f6;border:none;cursor:pointer;width:22px;height:22px;border-radius:50%;font-size:11px;color:#555;display:flex;align-items:center;justify-content:center;}
.bs-okay{width:100%;margin-top:14px;padding:10px;border-radius:10px;border:none;background:#4F46E5;color:#fff;font-size:12px;font-weight:600;cursor:pointer;}

/* Track expert map page */
.map-page{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;background:#fff;border-radius:24px;overflow:hidden;}
.map-topbar{background:#4F46E5;padding:6px 10px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.map-back{background:rgba(255,255,255,.18);border:none;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:13px;flex-shrink:0;}
.map-info{flex:1;min-width:0;}
.map-title{color:#fff;font-size:11px;font-weight:700;line-height:1.2;}
.map-sub{color:rgba(255,255,255,.8);font-size:9px;margin-top:1px;}
.map-eta{background:rgba(255,255,255,.18);border-radius:8px;padding:4px 8px;text-align:right;flex-shrink:0;}
.map-eta-val{color:#fff;font-size:12px;font-weight:700;line-height:1;}
.map-eta-lbl{color:rgba(255,255,255,.75);font-size:7px;}
.map-canvas{flex:1;position:relative;overflow:hidden;background:#e8edf0;}
.map-bottom{background:#fff;padding:10px 12px 10px;flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
.map-expert-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.map-avatar{width:28px;height:28px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#4F46E5;flex-shrink:0;}
.map-exp-name{font-size:11px;font-weight:600;color:#111827;}
.map-exp-sub{font-size:9px;color:#6b7280;}
.map-call-btn{margin-left:auto;background:#4F46E5;color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:9px;font-weight:600;cursor:pointer;}
.map-progress{height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden;}
.map-progress-fill{height:100%;background:#4F46E5;border-radius:2px;width:62%;}

.arch-overlay{position:fixed;inset:0;z-index:120;background:rgba(15,23,42,.62);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;}
.arch-panel{width:min(1120px,100%);max-height:min(92vh,880px);display:grid;grid-template-columns:minmax(280px,320px) minmax(0,1fr);background:#fbfaf6;border:1px solid #d9dde7;border-radius:24px;overflow:hidden;box-shadow:0 28px 80px rgba(15,23,42,.28);}
.arch-side{padding:28px;background:linear-gradient(160deg,#1f2a44 0%,#254270 56%,#587b76 100%);color:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:18px;}
.arch-side::after{content:'';position:absolute;right:-70px;bottom:-70px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22) 0%,rgba(255,255,255,0) 68%);}
.arch-kicker{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.72);position:relative;z-index:1;}
.arch-heading{font-size:29px;line-height:1.08;font-weight:700;max-width:10ch;position:relative;z-index:1;}
.arch-copy{font-size:13px;line-height:1.65;color:rgba(255,255,255,.84);max-width:26ch;position:relative;z-index:1;}
.arch-stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:auto;position:relative;z-index:1;}
.arch-stat{padding:12px;border-radius:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);}
.arch-stat-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:5px;}
.arch-stat-val{font-size:13px;font-weight:600;line-height:1.35;color:#fff;}
.arch-main{padding:22px 24px 24px;overflow:auto;background:linear-gradient(180deg,#fffdf8 0%,#f6f6f1 100%);}
.arch-main::-webkit-scrollbar{width:4px;}
.arch-main::-webkit-scrollbar-thumb{background:#d5d5d5;border-radius:999px;}
.arch-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;}
.arch-title{font-size:22px;font-weight:700;color:#111827;line-height:1.15;}
.arch-sub{font-size:12px;line-height:1.6;color:#5b6472;max-width:52ch;margin-top:6px;}
.arch-close{padding:8px 12px;border-radius:999px;border:1px solid #d3dae5;background:#fff;color:#334155;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;}
.arch-close:hover{background:#f8fafc;border-color:#bcc7d6;}
.arch-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
.arch-card{padding:16px;border-radius:18px;background:#fff;border:1px solid #e6e1d7;box-shadow:0 10px 30px rgba(15,23,42,.05);min-width:0;}
.arch-card-wide{grid-column:1/-1;}
.arch-card-title{font-size:13px;font-weight:700;color:#111827;margin-bottom:10px;}
.arch-note{font-size:11px;line-height:1.55;color:#5b6472;margin-bottom:10px;}
.arch-flow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
.arch-stage{padding:12px;border-radius:14px;background:linear-gradient(180deg,#f8fafc 0%,#f2f6fb 100%);border:1px solid #dde5ef;min-width:0;}
.arch-stage-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#475569;margin-bottom:6px;}
.arch-stage-title{font-size:12px;font-weight:700;color:#111827;margin-bottom:4px;}
.arch-stage-copy{font-size:10px;line-height:1.55;color:#64748b;}
.arch-list{display:flex;flex-direction:column;gap:10px;}
.arch-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:14px;background:#f8f5ee;border:1px solid #ece6da;}
.arch-pill{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 8px;border-radius:999px;background:#eef2ff;color:#3730A3;font-size:10px;font-weight:700;flex-shrink:0;}
.arch-pill.warm{background:#fff3dd;color:#B45309;}
.arch-pill.green{background:#e8f7ef;color:#047857;}
.arch-row-body{min-width:0;}
.arch-row-title{font-size:12px;font-weight:700;color:#111827;line-height:1.35;}
.arch-row-copy{font-size:11px;line-height:1.55;color:#4b5563;margin-top:2px;}
.arch-code{margin-top:0;padding:14px 16px;border-radius:16px;background:#111827;color:#e5edf9;font-size:11px;line-height:1.6;overflow:auto;font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;white-space:pre-wrap;word-break:break-word;}
.arch-footer{margin-top:14px;padding-top:14px;border-top:1px solid #ece6da;font-size:11px;line-height:1.6;color:#5b6472;}
.arch-inline{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;background:#ecfdf5;color:#065F46;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
@media (max-width:980px){.arch-panel{grid-template-columns:1fr;max-height:calc(100vh - 36px);}.arch-side{padding:24px;}.arch-heading{max-width:none;font-size:26px;}.arch-copy{max-width:none;}.arch-grid{grid-template-columns:1fr;}.arch-flow{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media (max-width:640px){.arch-overlay{padding:12px;}.arch-panel{border-radius:18px;max-height:calc(100vh - 24px);}.arch-main{padding:18px;}.arch-top{flex-direction:column;}.arch-stat-grid{grid-template-columns:1fr 1fr;}.arch-flow{grid-template-columns:1fr;}}

const DTC={main:'main',edge:'edge',recovery:'recovery',terminal:'terminal'};
const BDG={main:'badge bm',edge:'badge be',recovery:'badge br',terminal:'badge bt'};
const BLB={main:'Main flow',edge:'Edge case',recovery:'Recovery',terminal:'Terminal'};

function renderList(){
  const el=document.getElementById('SL');let lg='',h='';
  SD.forEach((s,i)=>{
    if(s.group!==lg){h+=`<div class="glbl">${s.group}</div>`;lg=s.group;}
    h+=`<div class="sitem${i===0?' active':''}" data-id="${s.id}" onclick="sel(${s.id})"><div class="sdot ${DTC[s.type]}"></div><div class="snlbl">${s.name}</div><div class="snum">${s.id}</div></div>`;
  });
  el.innerHTML=h;
}

function sel(id){
  document.querySelectorAll('.sitem').forEach(e=>e.classList.toggle('active',parseInt(e.dataset.id)===id));
  // remove any open overlay without touching s15 prev
  const ov=document.querySelector('.bs-overlay');if(ov)ov.remove();
  const mp=document.querySelector('.map-page');if(mp)mp.remove();
  // restore s15 prev if navigating away from it
  if(id!==15){const s15=SD.find(x=>x.id===15);if(s15&&s15._origPrev){s15.prev=s15._origPrev;delete s15._origPrev;}window._cancelFromId=null;}
  const s=SD.find(x=>x.id===id);
  document.getElementById('CT').textContent=s.name;
  document.getElementById('CB').textContent=BLB[s.type];
  document.getElementById('CB').className=BDG[s.type];
  if(EXP[id]===undefined)EXP[id]=false;
  document.getElementById('SC').innerHTML=rScr(id);
  document.getElementById('RP').innerHTML=rRight(s);
}

window.tog=function(id){hideCancel();EXP[id]=!EXP[id];document.getElementById('SC').innerHTML=rScr(id);};

function bExp(id){
  const items=ETL[id]||[];let rows='';
  items.forEach((it,i)=>{
    const isL=i===items.length-1,lk=it.lk||'';
    let ih='',lc='',lh='',sc='es';
    switch(it.t){
      case 'done':ih=`<div class="eid">✓</div>`;lc='edn';lh=`<div class="eld">${it.lb}</div>`;break;
      case 'done-red':ih=`<div class="eia rd" style="font-size:7px;font-weight:700">✕</div>`;lc='edn';lh=`<div class="eld">${it.lb}</div>`;break;
      case 'active':ih=`<div class="eia bl"><svg width="7" height="7" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3" fill="white"/></svg></div>`;lc='edn';lh=`<div class="ela">${it.lb}</div>`;sc='es cu';break;
      case 'active-orange':ih=`<div class="eia or"><svg width="7" height="7" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3" fill="white"/></svg></div>`;lc='ewn';lh=`<div class="ela o">${it.lb}</div>`;sc='es cu';break;
      case 'active-red':ih=`<div class="eia rd"><svg width="7" height="7" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3" fill="white"/></svg></div>`;lc='ewn';lh=`<div class="ela r">${it.lb}</div>`;sc='es cu';break;
      case 'active-green':ih=`<div class="eia gr"><svg width="7" height="7" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3" fill="white"/></svg></div>`;lh=`<div class="ela g">${it.lb}</div>`;sc='es cu';break;
      default:ih=`<div class="eip"></div>`;lh=`<div class="elp">${it.lb}</div>`;break;
    }
    rows+=`<div class="er${isL?'':' '+lc}">${ih}<div class="erc">${lh}<div class="${sc}">${it.sb}</div>${lk?`<a class="elk"${it.oc?` onclick="${it.oc}" style="cursor:pointer"`:''} >${lk}</a>`:''}</div></div>`;
  });
  return `<div class="ec2">${rows}</div>`;
}

function sc3(x){return `<div class="sc2">${x}</div>`;}

window.showCancel=function(){
  const frame=document.querySelector('.pframe');
  if(frame.querySelector('.bs-overlay'))return;
  const el=document.createElement('div');
  el.className='bs-overlay';
  el.innerHTML=`<div class="bs-sheet">
    <button class="bs-close" onclick="hideCancel()">✕</button>
    <div class="bs-icon">🚧</div>
    <div class="bs-title">Cancel your inspection?</div>
    <div class="bs-body">Buyers are looking for cars like yours, you can get a good offer, consider rescheduling instead.</div>
    <div class="bs-btns">
      <button class="bs-cancel" onclick="showReasons()">Cancel</button>
      <button class="bs-confirm" onclick="hideCancel()">Reschedule</button>
    </div>
  </div>`;
  frame.appendChild(el);
};

window.showReasons=function(){
  const o=document.querySelector('.bs-overlay');
  if(!o)return;
  o.innerHTML=`<div class="bs-sheet bs-reasons">
    <div class="bs-rtop">
      <div class="bs-rtitle">Select reason for cancellation</div>
      <button class="bs-close bs-close2" onclick="hideCancel()">✕</button>

      <label class="bs-rl" onclick="pickReason(this)"><span class="bs-radio"></span><span class="bs-rlbl">I don't want to sell my car right now</span></label>

    </div>
    <button class="bs-submit" id="bs-submit-btn" disabled onclick="submitCancel()">Submit</button>
  </div>`;
};

window.pickReason=function(el){
  document.querySelectorAll('.bs-rl').forEach(r=>{r.classList.remove('bs-rl-sel');r.querySelector('.bs-radio').classList.remove('bs-radio-sel');});
  el.classList.add('bs-rl-sel');
  el.querySelector('.bs-radio').classList.add('bs-radio-sel');
  const btn=document.getElementById('bs-submit-btn');
  if(btn){btn.disabled=false;btn.classList.add('bs-submit-active');}
};

window.submitCancel=function(){
  const o=document.querySelector('.bs-overlay');
  if(!o)return;
  o.innerHTML=`<div class="bs-dialog">
    <button class="bs-close bs-close3" onclick="confirmCancelled()">✕</button>
    <div class="bs-icon" style="margin-top:16px">🚧</div>
    <div class="bs-title" style="margin-top:8px">Inspection cancelled!</div>
    <div class="bs-body">You can reschedule it anytime</div>
    <div style="border-top:1px solid #f0f0f0;margin:12px -16px 0;"></div>
    <button class="bs-okay" onclick="confirmCancelled()">Okay</button>
  </div>`;
  o.style.alignItems='center';
  o.style.padding='16px';
};

window.confirmCancelled=function(){
  const curId=parseInt(document.querySelector('.sitem.active').dataset.id);
  const curName=SD.find(x=>x.id===curId)?.name||'Unknown state';
  const s15=SD.find(x=>x.id===15);
  s15._origPrev=s15._origPrev||s15.prev;
  s15.prev='Cancelled from: '+curName;
  // Store which state we cancelled from so CC[15] can render the right timeline
  window._cancelFromId=curId;
  // Remove overlay WITHOUT restoring prev (we want the override to show)
  const ov=document.querySelector('.bs-overlay');if(ov)ov.remove();
  sel(15);
};

window.hideCancel=function(){
  const o=document.querySelector('.bs-overlay');
  if(o)o.remove();
  // Restore state 15 prev only when user dismisses (not after confirm which already navigated)
  const s15=SD.find(x=>x.id===15);
  if(s15&&s15._origPrev){s15.prev=s15._origPrev;delete s15._origPrev;}
};

      // Find the last non-pending step (active/done) — that becomes the last done row
      // All steps up to and including the active one become done, pending ones are dropped

function rRight(s){
  const vcls={always:'cv va',hidden:'cv vh'};
  const vlbl={always:'Always shown',hidden:'Hidden'};
  const cr=s.cards.map(c=>{
    const li=c.lg.map(l=>{
      let bc='bl';
      if(l.includes('HIDDEN'))bc='gy';
      else if(l.includes('ORANGE'))bc='or';
      else if(l.includes('RED'))bc='rd';
      else if(l.includes('GREEN')||l.includes('RETURNS'))bc='gn';
      else if(l.includes('CHANGES')||l.includes('NEW'))bc='or';
      return `<div class="cli"><div class="clb ${bc}"></div><div>${l}</div></div>`;
    }).join('');
    return `<div class="crow"><div class="crh"><span class="cri">${c.i}</span><span class="crn">${c.n}</span><span class="${vcls[c.v]}">${vlbl[c.v]}</span></div><div class="crb">${li}</div></div>`;
  }).join('');
  return `
    <div class="occ-block"><div class="occ-lbl">Occurrence condition</div><div class="occ-val ${s.accent}">${s.occ}</div></div>
    <div class="tgrid">
      <div class="tbox"><div class="tlbl">Previous state</div><div class="tval${s.prev.startsWith('None')?' none':''}">${s.prev}</div></div>
      <div class="tbox"><div class="tlbl">Next state</div><div class="tval${s.next.startsWith('None')?' none':''}">${s.next}</div></div>
    </div>
    <div class="divider"></div>
    <div class="clbl">Card logic</div>${cr}`;
}
